<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioma Inc. — Plano de Marketing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ef;color:#1a1a1a;min-height:100vh}

/* NAV */
nav{background:#1A3C2A;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.nav-logo{color:#fff;font-size:15px;font-weight:500;letter-spacing:.02em}
.nav-logo span{opacity:.6;font-weight:400}
.nav-tabs{display:flex;gap:4px}
.nav-tab{background:transparent;border:none;color:rgba(255,255,255,.6);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s;font-family:inherit}
.nav-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-tab.active{background:rgba(255,255,255,.15);color:#fff}

/* HERO */
.hero{background:#1A3C2A;padding:2.5rem 2rem 2rem;color:#fff}
.hero h1{font-size:26px;font-weight:500;margin-bottom:.4rem}
.hero p{font-size:13px;opacity:.65;max-width:600px;line-height:1.6}
.hero-stats{display:flex;gap:2rem;margin-top:1.5rem;flex-wrap:wrap}
.hero-stat{border-left:2px solid rgba(255,255,255,.2);padding-left:1rem}
.hero-stat-n{font-size:22px;font-weight:500}
.hero-stat-l{font-size:11px;opacity:.55;margin-top:2px}

/* MAIN */
main{max-width:1100px;margin:0 auto;padding:2rem}

/* SECTIONS */
.section{display:none}
.section.active{display:block}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:0.5px solid #e0ddd6;border-radius:10px;padding:14px 16px}
.stat-card-n{font-size:22px;font-weight:500;color:#1A3C2A}
.stat-card-l{font-size:11px;color:#888;margin-top:3px}

/* FILTERS */
.filters-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem}
.fbtn{font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid #ccc;background:#fff;color:#555;cursor:pointer;transition:all .15s;font-family:inherit}
.fbtn:hover{border-color:#888}
.fbtn.active{color:#fff;border-color:transparent}
.month-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.mbtn{font-size:11px;padding:4px 10px;border-radius:14px;border:0.5px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:all .15s;font-family:inherit}
.mbtn:hover{border-color:#999}
.mbtn.active{background:#1A3C2A;color:#fff;border-color:#1A3C2A}

/* BOARD */
.month-group{margin-bottom:1.75rem}
.month-hd{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.07em;padding-bottom:8px;border-bottom:0.5px solid #e0ddd6;margin-bottom:10px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}

/* CARD */
.card{background:#fff;border:0.5px solid #e0ddd6;border-radius:10px;border-left:3px solid #ccc;cursor:pointer;transition:border-color .15s;overflow:hidden}
.card:hover{border-color:#bbb}
.card-head{padding:14px 16px 10px}
.card-type-pill{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:7px}
.card-title{font-size:13px;font-weight:500;color:#1a1a1a;line-height:1.35;margin-bottom:4px}
.card-date{font-size:11px;color:#999}
.card-foot{padding:8px 16px;border-top:0.5px solid #f0ede8;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pill{font-size:10px;padding:2px 8px;border-radius:10px;border:0.5px solid #e0ddd6;color:#666;background:#fafaf8}
.expand-btn{margin-left:auto;font-size:11px;color:#aaa;white-space:nowrap}
.detail{display:none;border-top:0.5px solid #f0ede8;padding:12px 16px}
.detail.open{display:block}
.detail-row{display:flex;gap:10px;padding:5px 0;border-bottom:0.5px solid #f0ede8;font-size:12px}
.detail-row:last-child{border-bottom:none}
.detail-key{font-weight:500;color:#444;min-width:100px;flex-shrink:0;font-size:11px}
.detail-val{color:#666;line-height:1.5;font-size:11px}
.empty-msg{padding:3rem;text-align:center;color:#aaa;font-size:13px}

/* GANTT */
.gantt-wrap{background:#fff;border:0.5px solid #e0ddd6;border-radius:12px;overflow-x:auto;padding:1.5rem}
.gantt-svg-wrap{min-width:720px}
.gantt-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:1.25rem;padding-top:1rem;border-top:0.5px solid #f0ede8}
.gantt-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#555}
.gantt-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* PARCEIROS */
.parceiros-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.parceiro-card{background:#fff;border:0.5px solid #e0ddd6;border-radius:10px;padding:14px 16px}
.parceiro-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.parceiro-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.parceiro-name{font-size:13px;font-weight:500;color:#1a1a1a}
.parceiro-seg{font-size:11px;color:#999}
.parceiro-body{font-size:11px;color:#666;line-height:1.55}
.parceiro-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin-top:8px;margin-right:4px}

@media(max-width:600px){
  .hero-stats{gap:1rem}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  nav{padding:0 1rem}
  main{padding:1rem}
  .hero{padding:1.5rem 1rem}
}
</style>
</head>

</main>

// ─── STATE ───────────────────────────────────────────────────────────────────
let filtroTipo = "Todos";
let filtrosMes = new Set(MESES);

// ─── SECTION SWITCH ───────────────────────────────────────────────────────────
function showSection(id) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id==='gantt') renderGantt();
  if(id==='parceiros') renderParceiros();
}

// ─── AÇÕES ────────────────────────────────────────────────────────────────────
function renderStats(){
  const v = ACOES.filter(a=>(filtroTipo==='Todos'||a.tipo===filtroTipo)&&filtrosMes.has(a.mes));
  const byTipo={};
  v.forEach(a=>{byTipo[a.tipo]=(byTipo[a.tipo]||0)+1});
  const top=Object.entries(byTipo).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-row').innerHTML=`
    <div class="stat-card"><div class="stat-card-n">${v.length}</div><div class="stat-card-l">ações selecionadas</div></div>
    <div class="stat-card"><div class="stat-card-n">${[...new Set(v.map(a=>a.mes))].length}</div><div class="stat-card-l">meses ativos</div></div>
    <div class="stat-card"><div class="stat-card-n" style="font-size:16px">${top?top[0].split(' ')[0]:'—'}</div><div class="stat-card-l">pilar principal</div></div>
    <div class="stat-card"><div class="stat-card-n">${[...new Set(v.map(a=>a.projeto.split('/')[0].trim()))].length}</div><div class="stat-card-l">projetos cobertos</div></div>
  `;
}

function renderFilters(){
  const tipos=['Todos',...Object.keys(TIPOS)];
  document.getElementById('filters').innerHTML=tipos.map(t=>{
    const s=TIPOS[t]||{};
    const active=filtroTipo===t;
    return `<button class="fbtn${active?' active':''}" style="${active?`background:${s.bg};border-color:${s.bg};color:#fff`:''}" onclick="setFiltro('${t}')">${t}</button>`;
  }).join('');
}

function renderMonthFilters(){
  document.getElementById('monthFilters').innerHTML=MESES.map(m=>{
    const active=filtrosMes.has(m);
    return `<button class="mbtn${active?' active':''}" onclick="toggleMes('${m}')">${m}</button>`;
  }).join('');
}

function toggleCard(id){
  const d=document.getElementById('d-'+id);
  const b=document.getElementById('b-'+id);
  if(d.classList.contains('open')){d.classList.remove('open');b.textContent='ver mais';}
  else{d.classList.add('open');b.textContent='fechar';}
}

function renderBoard(){
  const v=ACOES.filter(a=>(filtroTipo==='Todos'||a.tipo===filtroTipo)&&filtrosMes.has(a.mes));
  if(!v.length){document.getElementById('board').innerHTML='<div class="empty-msg">Nenhuma ação para os filtros selecionados.</div>';return;}
  const byMes={};MESES.forEach(m=>{byMes[m]=[]});
  v.forEach(a=>byMes[a.mes].push(a));
  document.getElementById('board').innerHTML=MESES.filter(m=>byMes[m].length).map(mes=>{
    const cards=byMes[mes].map((a,i)=>{
      const id='c'+ACOES.indexOf(a);
      const s=TIPOS[a.tipo]||{bg:'#888',light:'#eee',dark:'#333'};
      const fields=[
        ['Canal',a.canal],['Objetivo',a.objetivo],['Público-alvo',a.publico],
        ['Parceiro mapeado',a.parceiro],['Responsável',a.responsavel],
        ['Estimativa de investimento',a.investimento],['Mecânica / Obs.',a.obs]
      ];
      return `<div class="card" style="border-left-color:${s.bg}">
        <div class="card-head" onclick="toggleCard('${id}')">
          <span class="card-type-pill" style="background:${s.light};color:${s.dark}">${a.tipo}</span>
          <div class="card-title">${a.titulo}</div>
          <div class="card-date">${a.data}</div>
        </div>
        <div class="card-foot" onclick="toggleCard('${id}')">
          <span class="pill">${a.projeto}</span>
          <span class="pill">${a.objetivo.split('·')[0].trim()}</span>
          <span class="expand-btn" id="b-${id}">ver mais</span>
        </div>
        <div class="detail" id="d-${id}">
          ${fields.map(([k,v])=>`<div class="detail-row"><div class="detail-key">${k}</div><div class="detail-val">${v}</div></div>`).join('')}
        </div>
      </div>`;
    }).join('');
    return `<div class="month-group"><div class="month-hd">${mes} &nbsp;·&nbsp; ${byMes[mes].length} ação${byMes[mes].length>1?'ões':''}</div><div class="cards-grid">${cards}</div></div>`;
  }).join('');
}

function setFiltro(t){filtroTipo=t;renderAll();}
function toggleMes(m){if(filtrosMes.has(m)){if(filtrosMes.size>1)filtrosMes.delete(m);}else filtrosMes.add(m);renderAll();}
function renderAll(){renderStats();renderFilters();renderMonthFilters();renderBoard();}
renderAll();

    {label:"Digital",sub:"Campanhas",cor:"#3B6D11",rows:[
      {sublabel:"Geo",bars:[{x:0,w:.5,label:"Agrishow"},{x:.4,w:.3,label:"SPIW"},{x:2,w:.4,label:"Marathon"},{x:3,w:.4,label:"ANDAV"},{x:4,w:.9,label:"AgroTech"},{x:5,w:.4,label:"GAFFFF"}]},
      {sublabel:"Camp.",bars:[{x:1,w:2,label:"Remarketing base mai"},{x:4,w:.9,label:"Reativação frios"},{x:5.8,w:.8,label:"Conv. Q4"},{x:7,w:1,label:"Retrospectiva"}]}
    ]},
    {label:"Stand",sub:"Eventos próprios",cor:"#BA7517",rows:[
      {sublabel:"Yoga",bars:[{x:0,w:.8,label:"Bioma"},{x:1,w:.8,label:"Jardins"},{x:3,w:.8,label:"Alto da Lapa"},{x:5,w:.9,label:"Yoga + Brunch"}]},
      {sublabel:"Pilates/Deg.",bars:[{x:0,w:.8,label:"Pilates+Suntory"},{x:2,w:.8,label:"Pós-marathon"},{x:4,w:.8,label:"Deg. vinhos"},{x:6,w:.8,label:"Deg. fim de ano"}]}
    ]},
    {label:"Local Parceiro",sub:"Eventos externos",cor:"#993C1D",rows:[
      {sublabel:"Gastro",bars:[{x:1,w:.8,label:"Cacho Bar"},{x:1,w:.8,label:"Leveda"},{x:3,w:.8,label:"Bona Música"},{x:1.6,w:.7,label:"Coffee Fest."}]},
      {sublabel:"Jantares VIP",bars:[{x:2,w:.8,label:"Qta. Sta. Maria"},{x:5,w:.8,label:"Veridiana"},{x:5,w:.8,label:"GAFFFF"},{x:6,w:.8,label:"L'Entrecôte"},{x:7,w:.8,label:"Encerramento"}]}
    ]},
    {label:"Influencers",sub:"Conteúdo orgânico",cor:"#534AB7",bars:[
      {x:1,w:.9,label:"Arq./Lifestyle"},{x:2,w:.9,label:"Gastronomia"},{x:4,w:.9,label:"Arq. sustentável"},{x:6,w:.9,label:"Lifestyle"}
    ]},
    {label:"Marcas",sub:"Parceiras",cor:"#0F6E56",rows:[
      {sublabel:"Permuta",bars:[{x:0,w:8,label:"Philco + Britânia — stand equipado (contínuo)"}]},
      {sublabel:"PDV",bars:[{x:3,w:3,label:"Pão de Açúcar — PDV ativo"},{x:7,w:1,label:"Smartstore"}]}
    ]},
    {label:"Valet",sub:"Patrocínio",cor:"#993556",rows:[
      {sublabel:"Apinajés",bars:[{x:0,w:.8,label:"Manihi"},{x:1,w:.8,label:"Flores"},{x:3,w:.8,label:"Mesa III"}]},
      {sublabel:"Alto da Lapa",bars:[{x:2,w:.8,label:"IPO Bar"},{x:4,w:.8,label:"Hilda"},{x:4.82,w:.8,label:"Vituccio"}]},
      {sublabel:"Jardins",bars:[{x:5,w:.8,label:"La Braciera"},{x:6,w:.8,label:"Gero/Les Deux"}]}
    ]},
    {label:"VIP",sub:"Relacionamento",cor:"#444441",bars:[
      {x:0,w:.45,label:"Suntory"},{x:0.46,w:.5,label:"TUCCA"},{x:1,w:.8,label:"Jantar #1"},{x:2,w:.8,label:"Jantar #2"},{x:5,w:.8,label:"Jantar #3"},{x:7,w:.8,label:"Encerramento"}
    ]},
  ];
  const MONTHS=["Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const ROW_H=28, SUBROW_H=22, HEADER_H=32, PAD=16;
  let y=HEADER_H+PAD;
  let svgRows=[];
  let totalH=HEADER_H+PAD;
  GANTT_ROWS.forEach(row=>{
    if(row.rows){totalH+=ROW_H+(row.rows.length*SUBROW_H)+6;}
    else{totalH+=ROW_H;}
    totalH+=4;
  });
  totalH+=PAD;
  let svgH=totalH;
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${svgH}" width="100%" style="display:block">`;
  svg+=`<rect width="${W}" height="${svgH}" fill="#fff"/>`;
  svg+=`<rect y="0" width="${W}" height="${HEADER_H}" fill="#1A3C2A"/>`;
  MONTHS.forEach((m,i)=>{
    const cx=LW+(i+.5)*mw;
    svg+=`<text x="${cx}" y="${HEADER_H/2+5}" text-anchor="middle" font-size="11" fill="#fff" font-family="sans-serif" font-weight="500">${m}</text>`;
    if(i>0) svg+=`<line x1="${LW+i*mw}" y1="0" x2="${LW+i*mw}" y2="${svgH}" stroke="#e8e5e0" stroke-width=".5"/>`;
  });
  svg+=`<line x1="${LW}" y1="0" x2="${LW}" y2="${svgH}" stroke="#ddd" stroke-width=".5"/>`;
  y=HEADER_H+PAD;
  GANTT_ROWS.forEach((row,ri)=>{
    const bandH=row.rows?(ROW_H+row.rows.length*SUBROW_H+6):ROW_H;
    svg+=`<rect x="0" y="${y-4}" width="${W}" height="${bandH+8}" fill="${ri%2===0?'#fafaf8':'#f5f4f0'}"/>`;
    svg+=`<rect x="0" y="${y-4}" width="4" height="${bandH+8}" fill="${row.cor}"/>`;
    svg+=`<text x="10" y="${y+12}" font-size="11" font-weight="500" fill="${row.cor}" font-family="sans-serif">${row.label}</text>`;
    svg+=`<text x="10" y="${y+24}" font-size="9" fill="#999" font-family="sans-serif">${row.sub}</text>`;
    if(row.bars){
      row.bars.forEach(b=>{
        if(!b.label) return;
        const bx=LW+b.x*mw+2, bw=b.w*mw-4;
        svg+=`<rect x="${bx}" y="${y}" width="${bw}" height="18" rx="3" fill="${row.cor}" opacity=".85"/>`;
        if(bw>30) svg+=`<text x="${bx+bw/2}" y="${y+12}" text-anchor="middle" font-size="8.5" fill="#fff" font-family="sans-serif">${b.label}</text>`;
      });
      y+=ROW_H;
    } else if(row.rows){
      y+=ROW_H-4;
      row.rows.forEach(sr=>{
        svg+=`<text x="14" y="${y+13}" font-size="8.5" fill="${row.cor}" opacity=".7" font-family="sans-serif">${sr.sublabel}</text>`;
        sr.bars.forEach(b=>{
          const bx=LW+b.x*mw+2, bw=b.w*mw-4;
          svg+=`<rect x="${bx}" y="${y}" width="${Math.max(bw,8)}" height="16" rx="3" fill="${row.cor}" opacity="${sr.sublabel.includes('cont')?'.5':'.82'}"/>`;
          if(bw>28) svg+=`<text x="${bx+bw/2}" y="${y+11}" text-anchor="middle" font-size="7.5" fill="#fff" font-family="sans-serif">${b.label}</text>`;
        });
        y+=SUBROW_H;
      });
      y+=2;
    }
    y+=4;
    svg+=`<line x1="0" y1="${y-2}" x2="${W}" y2="${y-2}" stroke="#e8e5e0" stroke-width=".5"/>`;
  });
  svg+=`</svg>`;
  document.getElementById('gantt-container').innerHTML=svg;
  document.getElementById('gantt-legend').innerHTML=Object.entries(TIPOS).map(([t,s])=>`
    <div class="gantt-legend-item">
      <span class="gantt-legend-dot" style="background:${s.bg}"></span>${t}
    </div>`).join('');
}

// ─── PARCEIROS ────────────────────────────────────────────────────────────────
function renderParceiros(){
  const projCor={
    "Bioma":"#1A3C2A","Apinajés":"#BA7517","Alto da Lapa":"#185FA5",
    "Jardins":"#993556","Apinajés / Alto da Lapa":"#0F6E56"
  };
  document.getElementById('parceiros-grid').innerHTML=PARCEIROS_DATA.map(p=>{
    const cor=projCor[p.projeto]||"#888";
    const initials=p.nome.split(' ').slice(0,2).map(w=>w[0]).join('');
    const tipoCor=TIPOS[p.tipo]||{light:'#eee',dark:'#555'};
    return `<div class="parceiro-card">
      <div class="parceiro-header">
        <div class="parceiro-avatar" style="background:${cor}22;color:${cor}">${initials}</div>
        <div>
          <div class="parceiro-name">${p.nome}</div>
          <div class="parceiro-seg">${p.seg} &nbsp;·&nbsp; ${p.seguidores} seg.</div>
        </div>
      </div>
      <div class="parceiro-body">
        <strong style="color:#333">Ação:</strong> ${p.acao}<br>
        <strong style="color:#333">Contato:</strong> ${p.ig}
      </div>
      <div>
        <span class="parceiro-tag" style="background:${cor}18;color:${cor}">${p.projeto}</span>
        <span class="parceiro-tag" style="background:${tipoCor.light};color:${tipoCor.dark}">${p.tipo}</span>
      </div>
    </div>`;
  }).join('');
}
